<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>認証 - 系統分類書架</title>
    <style>
        :root { --bg-color: #fcfcfc; --text-color: #222; --border-color: #ddd; }
        body { font-family: "Yu Mincho", serif; margin: 0; padding: 4rem 2rem; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center;}
        .container { width: 100%; max-width: 400px; background: #fff; padding: 3rem; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; }
        h1 { font-size: 1.5rem; margin-top: 0; border-bottom: 1px solid var(--text-color); padding-bottom: 0.5rem; font-weight: normal;}
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 0.3rem; }
        .form-group input { width: 100%; padding: 0.6rem; box-sizing: border-box; border: 1px solid var(--border-color); font-family: sans-serif; font-size: 1rem; }
        button { width: 100%; padding: 0.8rem; border: 1px solid var(--text-color); background: var(--text-color); color: white; font-family: inherit; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        button:hover { background: #444; }
        a { color: #666; font-size: 0.9rem; text-decoration: none; display: block; margin-top: 1rem; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        {% if mode == "login" %}
            <h1 data-i18n="title_login">入室 (ログイン)</h1>
            <form action="/login" method="POST">
                <div class="form-group"><label>Username</label><input type="text" name="username" required></div>
                <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
                <button type="submit" data-i18n="btn_login">認証</button>
            </form>
            <a href="/register" data-i18n="link_reg">新規登録はこちら</a>
        {% else %}
            <h1 data-i18n="title_reg">資格登録 (ユーザー登録)</h1>
            <form action="/register" method="POST">
                <div class="form-group"><label>Username</label><input type="text" name="username" required></div>
                <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
                <button type="submit" data-i18n="btn_reg">登録</button>
            </form>
            <a href="/login" data-i18n="link_login">既にお持ちの方はこちら</a>
        {% endif %}
    </div>

    <script>
        const i18n = {
            ja: { title_login: "入室 (ログイン)", btn_login: "認証", link_reg: "新規登録はこちら", title_reg: "資格登録 (ユーザー登録)", btn_reg: "登録", link_login: "既にお持ちの方はこちら" },
            en: { title_login: "Sign In", btn_login: "Login", link_reg: "Create an account", title_reg: "Sign Up", btn_reg: "Register", link_login: "Already have an account?" }
        };
        const lang = localStorage.getItem("cladogram_lang") || "ja";
        document.querySelectorAll("[data-i18n]").forEach(el => el.innerHTML = i18n[lang][el.getAttribute("data-i18n")]);
    </script>
</body>
</html>
